services:
  app:
    build:
      context: .
    container_name: pelanggansetia-app
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:z
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: pelanggansetia-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pelanggansetiadb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: